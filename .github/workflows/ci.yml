name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      run_dep_check:
        description: "Запускати OWASP Dependency-Check?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  build:
    name: Build, Test & Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        run: mvn --batch-mode clean verify

      - name: Publish test results as job summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit Test Results
          path: '**/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: OWASP Dependency-Check
        if: ${{ github.event.inputs.run_dep_check == 'true' }}
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: >
          mvn --batch-mode
          org.owasp:dependency-check-maven:check
          -DnvdApiKey=${{ env.NVD_API_KEY }}
          -DfailBuildOnCVSS=7
          -DsuppressionFile=.github/owasp-suppressions.xml
          --fail-at-end
        continue-on-error: true

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: '**/target/dependency-check-report.html'
          if-no-files-found: ignore
